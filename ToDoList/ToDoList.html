<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My ToDoList</title>
    <link href="Style/ToDoStyle.css" rel="stylesheet" />
  </head>

  <body>
    <h1>My To Do List</h1>
    <h2>Empty list.</h2>
    <main>
      <input id="Text" type="text" placeholder="Enter new Task" />
      <button id="AddTaskBtn" type="button">Add Task</button> <br />
      <input type="text" placeholder="Search Task" id="search" /><br />
      <input id="DeleteList" type="button" value="Delete List" />
      <input type="color" value="#add8e6" id="color" />
      <button id="MyBtn" type="button">Click Me</button>
      <ul id="list"></ul>
    </main>
    <script src="Js/ToDoJs.js"></script>
  </body>
